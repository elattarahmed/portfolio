<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Projets Annuels - En Construction</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
		<style>
			:root {
				--bg:      hsl(230 15% 5%);
				--fg:      hsl(150 60% 90%);
				--muted:   hsl(220 10% 50%);
				--primary: hsl(135 100% 50%);
				--dim:     hsl(135 60% 30%);
				--border:  hsl(135 40% 15%);
			}
			*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				font-family: "JetBrains Mono", monospace;
				background-color: var(--bg);
				color: var(--fg);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100vh;
				margin: 0;
				text-align: center;
				background-image:
					linear-gradient(var(--dim) / 0.08 1px, transparent 1px),
					linear-gradient(90deg, var(--dim) / 0.08 1px, transparent 1px);
				background-size: 40px 40px;
			}
			h1 {
				font-size: 2rem;
				margin-bottom: 1rem;
				color: var(--primary);
				text-shadow: 0 0 20px hsl(135 100% 50% / 0.4);
			}
			h1::before { content: "// "; color: hsl(135 100% 50% / 0.5); }
			p {
				font-size: 1rem;
				color: var(--muted);
				margin-bottom: 2rem;
			}
			a {
				padding: 0.65rem 1.75rem;
				background-color: var(--primary);
				color: var(--bg);
				text-decoration: none;
				border-radius: 0.5rem;
				font-weight: 700;
				font-size: 0.875rem;
				letter-spacing: 0.05em;
				transition: box-shadow 0.2s, transform 0.2s;
			}
			a:hover {
				box-shadow: 0 0 24px hsl(135 100% 50% / 0.5);
				transform: translateY(-2px);
			}
		</style>
	</head>
	<body>
		<h1>Page en cours de construction</h1>
		<p>Cette section sera bientôt disponible.</p>
		<a href="/">Retour à l'accueil</a>
	</body>
</html>
